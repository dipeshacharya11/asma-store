{% load static %}

<header id="siteHeader" class="site-header">
    <div class="header-grid">
        <!-- LEFT: Logo -->
        <a href="{% url 'store:home' %}" class="logo">
            <img src="{% static 'store/images/logo_bg_r.png' %}" alt="Asma Stores">
        </a>

        <!-- CENTER: Search Bar (desktop only) -->
        <div class="search-bar-desktop desktop-only">
            <!-- Shop dropdown -->
            <a href="{% url 'store:collection' %}" class="shop-link" data-mega-trigger="shop" aria-label="Shop categories">
                Shop
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m7 10 5 5 5-5"/>
                </svg>
            </a>
            <!-- Search form -->
            <form action="{% url 'store:search' %}" method="get" class="search-form">
                <input type="text" name="q" placeholder="Search perfumes, attars, oud..." aria-label="Search products">
                <button type="submit" class="search-button" aria-label="Search">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <circle cx="10.8" cy="10.8" r="6.6"/>
                        <path d="m16 16 4.2 4.2"/>
                    </svg>
                </button>
            </form>
        </div>

        <!-- RIGHT: Icons -->
        <div class="header-icons">
            <!-- Account -->
            {% if user.is_authenticated %}
            <a href="{% url 'store:account' %}" class="icon-btn" aria-label="My account">
            {% else %}
            <a href="{% url 'store:login' %}" class="icon-btn" aria-label="Sign in">
            {% endif %}
                <svg viewBox="0 0 24 24">
                    <circle cx="12" cy="7" r="3.8"/>
                    <path d="M4.5 21v-2.2a7.5 7.5 0 0 1 15 0V21"/>
                </svg>
            </a>

            <!-- Wishlist -->
            <a href="{% url 'store:wishlist' %}" class="icon-btn" aria-label="Wishlist{% if wishlist_count %} ({{ wishlist_count }} items{% endif %})">
                <svg viewBox="0 0 24 24">
                    <path d="M12 20.5s-7.5-4.6-10-9.3C.4 7.8 2 4.5 5.4 4c2.1-.3 4 .8 6.6 3.5C14.6 4.8 16.5 3.7 18.6 4c3.4.5 5 3.8 3.4 7.2C21.5 15.9 12 20.5 12 20.5Z"/>
                </svg>
                {% if wishlist_count %}
                <span class="cart-badge" id="wishlistBadge">{{ wishlist_count }}</span>
                {% endif %}
            </a>

            <!-- Cart -->
            <button type="button" class="icon-btn cart-icon-btn" id="cartTrigger" aria-label="Open cart">
                <svg class="cart-bag-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <defs>
                        <linearGradient id="goldBagGradient" x1="0" y1="0" x2="1" y2="1">
                            <stop offset="0%" stop-color="#FCEABB"/>
                            <stop offset="35%" stop-color="#E8C25B"/>
                            <stop offset="70%" stop-color="#C9971F"/>
                            <stop offset="100%" stop-color="#8F6A0F"/>
                        </linearGradient>
                    </defs>
                    <path d="M6.5 8.5h11l.9 12h-12.8l.9-12Z" fill="url(#goldBagGradient)" stroke="#8F6A0F" stroke-width="1"/>
                    <path d="M9 9V6.5a3 3 0 0 1 6 0V9" fill="none" stroke="url(#goldBagGradient)" stroke-width="1.8"/>
                </svg>
                {% if cart_count %}
                <span class="cart-badge" id="cartBadge">{{ cart_count }}</span>
                {% endif %}
            </button>

            <!-- Search trigger (mobile only) -->
            <button
                type="button"
                class="icon-btn search-trigger-mobile mobile-only"
                id="searchTrigger"
                aria-label="Search"
            >
                <svg viewBox="0 0 24 24">
                    <circle cx="10.8" cy="10.8" r="6.6"/>
                    <path d="m16 16 4.2 4.2"/>
                </svg>
            </button>
        </div>

        <!-- Burger button (mobile only) -->
        <button
            type="button"
            class="burger mobile-only"
            id="burgerBtn"
            aria-label="Open menu"
            aria-controls="mobileDrawer"
            aria-expanded="false"
        >
            <svg viewBox="0 0 24 24">
                <path d="M4 7h16M4 12h16M4 17h16"/>
            </svg>
        </button>
    </div>
</header>
