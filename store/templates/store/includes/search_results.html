{% if results %}
<div class="search-results-grid">
  {% for p in results %}
  <a class="search-result-card" href="{{ p.get_absolute_url }}">
    <div class="search-result-thumb" style="{% if p.primary_image_url %}background-image:url('{{ p.primary_image_url }}');{% else %}background:{{ p.image_gradient|default:'linear-gradient(160deg,#235C93,#6FA6C5)' }};{% endif %}"></div>
    <h6>{{ p.name }}</h6>
    <span>Rs. {{ p.price }}</span>
  </a>
  {% endfor %}
</div>
{% elif query %}
<div class="search-empty-state">
  <svg viewBox="0 0 120 120" aria-hidden="true">
    <circle cx="52" cy="52" r="34" fill="none" stroke="currentColor" stroke-width="4"/>
    <path d="m77 77 24 24" fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
    <path d="M40 52h24M52 40v24" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" opacity=".5"/>
  </svg>
  <h3>No products found</h3>
  <p>Try another keyword or browse our collections.</p>
  <a href="{% url 'store:collection' %}" class="btn btn-primary">Browse Collections</a>
</div>
{% endif %}
